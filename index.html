<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://static.famous.ai/debug.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check-iN | AI-Powered Healthcare Assistant & Safety Monitor for Seniors</title>
    <meta name="description"
        content="Check-iN is an AI-powered healthcare assistant designed to support senior citizens in living independently by providing health monitoring and emergency support." />
    <link rel="icon" type="image/svg+xml" href="https://senior-health-guardian.deploypad.app/placeholder.svg" />

    <meta property="og:title" content="Check-iN Health Assistant" />
    <meta property="og:description"
        content="Check-iN is an AI-powered healthcare assistant designed to support senior citizens in living independently by providing health monitoring and emergency support." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://senior-health-guardian.deploypad.app/og.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://senior-health-guardian.deploypad.app/og.jpg" />

    <!-- Bundled Assets from the updated app -->
    <script type="module" crossorigin
        src="https://senior-health-guardian.deploypad.app/assets/index-UQPWHVSp.js"></script>
    <link rel="stylesheet" crossorigin href="https://senior-health-guardian.deploypad.app/assets/index-BAUHJFu0.css">

    <style>
        /* Force scrolling for both mobile and desktop */
        html,
        body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: auto !important;
            height: auto !important;
            min-height: 100% !important;
            -webkit-overflow-scrolling: touch !important;
        }

        /* Hide 'Explore App' button from the dynamic Famous.ai bundle */
        [data-famous-id*="button"]:has(*:contains("Explore App")),
        button:has(*:contains("Explore App")),
        a:has(*:contains("Explore App")),
        div:has(> span:contains("Explore App")) {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Hide specific elements: gear, Admin, old Privacy Settings */
        .hide-element {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Custom Team Portal link (CRM) - moved to extreme right */
        #portal-tab-custom {
            padding: 0.6rem 1.4rem;
            background: #0ea5e9;
            color: white !important;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none !important;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 2147483647;
            /* Ensure it stays above the SPA layer */
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: block !important;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        #portal-tab-custom:hover {
            background: #0284c7;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
        }

        @media (max-width: 768px) {
            #portal-tab-custom {
                right: 15px;
                top: 80px;
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- Team Portal points to the CRM (ccrm.html) -->
    <a href="ccrm.html" id="portal-tab-custom">Team Portal</a>

    <script>
        window.__SITE_ID__ = '69923537a592372b8bebdfe6';

        const applyFixes = () => {
            // Force restore scrolling
            document.documentElement.style.setProperty('overflow', 'auto', 'important');
            document.body.style.setProperty('overflow', 'auto', 'important');
            document.documentElement.style.setProperty('height', 'auto', 'important');
            document.body.style.setProperty('height', 'auto', 'important');

            // Find and modify specific elements from the SPA
            document.querySelectorAll('button, a, span, div, p').forEach(el => {
                const text = el.textContent.trim();

                // Exact match for UI hiding
                if (text.toLowerCase() === 'explore app' || text === 'Admin' || text === 'Privacy Settings') {
                    const target = el.closest('button') || el.closest('a') || el;
                    if (target) {
                        target.classList.add('hide-element');
                    }
                }

                // Hide Introductory Pricing Band conservatively
                if (text.toLowerCase().includes('introductory')) {
                    if (el.children.length === 0) {
                        const target = el.closest('div') || el;
                        if (target.textContent.length < 200) {
                            target.classList.add('hide-element');
                        } else {
                            el.classList.add('hide-element');
                        }
                    }
                }

                // Address substitution (ONLY on leaf nodes to prevent wiping out the entire page container!)
                if (el.children.length === 0) {
                    if (text.includes('San Francisco') || text.includes('Bangalore') || text === 'Mumbai, Maharashtra 400051') {
                        // Prevent infinite loop rewriting if it's already correct
                        if (text !== 'The Office is in Mumbai, Maharashtra 400051') {
                            el.textContent = 'The Office is in Mumbai, Maharashtra 400051';
                        }
                    }
                }

                // Inject Links and Fix text (Anchors only)
                if (el.tagName === 'A') {
                    if (text === 'Privacy Policy') {
                        el.href = 'https://drive.google.com/file/d/1facmn0XHT8RXXUIyClodPbqMDcaYP-1h/view?usp=sharing';
                        el.target = '_blank';
                    }
                    if (text === 'Terms of Service') {
                        el.href = 'https://drive.google.com/file/d/15dinH7ljCb8FooHwvIpQXrE9MdouHgz1/view?usp=sharing';
                        el.target = '_blank';
                    }
                    if (text === 'FAQ' || text === 'FAQs') {
                        el.textContent = 'FAQs';
                        el.href = 'https://docs.google.com/document/d/1SRFPSK-cVkENgcPIJyO5ZUVoVhuf8VEL/edit?usp=sharing&ouid=106024047286888919119&rtpof=true&sd=true';
                        el.target = '_blank';
                    }
                }
            });

            // Hide Gear Icon specifically
            document.querySelectorAll('svg').forEach(svg => {
                const parentBtn = svg.closest('button');
                if (parentBtn && parentBtn.textContent.trim() === '' && !parentBtn.closest('nav')) {
                    parentBtn.classList.add('hide-element');
                }
            });
        };

        // Run immediately and then frequently to combat SPA state changes
        applyFixes();
        window.addEventListener('load', applyFixes);
        setInterval(applyFixes, 800);
    </script>
    <script src="https://static.famous.ai/events.js"></script>
</body>

</html>
