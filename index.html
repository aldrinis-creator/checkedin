    <meta property="og:title" content="Check-iN Health Assistant" />

        content="Check-iN is an AI-powered healthcare assistant designed to support senior citizens in living independently by providing health monitoring and emergency support." />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Bundled Assets from the updated app -->
    <script type="module" crossorigin
        src="https://senior-health-guardian.deploypad.app/assets/index-UQPWHVSp.js"></script>
    <link rel="stylesheet" crossorigin href="https://senior-health-guardian.deploypad.app/assets/index-BAUHJFu0.css">

    <style>
        /* Ensure the Caregiver Portal is accessible and scrolling is enabled */
        body {
            margin: 0;
            overflow-y: auto !important;
            /* Force scrolling just in case */
        }

        /* Add a custom Caregiver Portal link to the header if it's missing from the bundle */
        #portal-tab-custom {
            padding: 0.5rem 1rem;
            background: #0ea5e9;
            color: white;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            position: fixed;
            top: 15px;
            right: 250px;
            z-index: 9999;
            display: none;
            /* Hidden by default, script will show if needed */
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- Caregiver Portal link overlay -->
    <a href="https://myhealthcompanion.online/" id="portal-tab-custom">Caregiver Portal</a>

    <script>
        window.__SITE_ID__ = '69923537a592372b8bebdfe6';

        // Verification script to ensure scrolling is restored
        window.addEventListener('load', () => {
            document.documentElement.style.overflow = 'auto';
            document.body.style.overflow = 'auto';

            // Show the portal link if the main nav doesn't have it
            setTimeout(() => {
                const nav = document.querySelector('nav');
                if (nav && !nav.innerText.toLowerCase().includes('caregiver')) {
                    document.getElementById('portal-tab-custom').style.display = 'block';
                }
            }, 2000);
        });
    </script>
    <script src="https://static.famous.ai/events.js"></script>
</body>

</html>
