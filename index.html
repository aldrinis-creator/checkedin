<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://static.famous.ai/debug.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check-iN | AI-Powered Healthcare Assistant & Safety Monitor for Seniors</title>
    <meta name="description"
        content="Check-iN is an AI-powered healthcare assistant designed to support senior citizens in living independently by providing health monitoring and emergency support." />
    <link rel="icon" type="image/svg+xml" href="https://senior-health-guardian.deploypad.app/placeholder.svg" />

    <meta property="og:title" content="Check-iN Health Assistant" />
    <meta property="og:description"
        content="Check-iN is an AI-powered healthcare assistant designed to support senior citizens in living independently by providing health monitoring and emergency support." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://senior-health-guardian.deploypad.app/og.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://senior-health-guardian.deploypad.app/og.jpg" />

    <!-- Bundled Assets from the updated app -->
    <script type="module" crossorigin
        src="https://senior-health-guardian.deploypad.app/assets/index-UQPWHVSp.js"></script>
    <link rel="stylesheet" crossorigin href="https://senior-health-guardian.deploypad.app/assets/index-BAUHJFu0.css">

    <style>
        /* Force scrolling for both mobile and desktop */
        html,
        body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: auto !important;
            height: auto !important;
            min-height: 100% !important;
            -webkit-overflow-scrolling: touch !important;
        }

        /* Hide 'Explore App' button from the dynamic Famous.ai bundle */
        [data-famous-id*="button"]:has(*:contains("Explore App")),
        button:has(*:contains("Explore App")),
        a:has(*:contains("Explore App")),
        div:has(> span:contains("Explore App")) {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Hide specific elements: gear, Admin, old Privacy Settings */
        .hide-element {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Custom Team Portal link (CRM) - moved to extreme right */
        #portal-tab-custom {
            padding: 0.6rem 1.4rem;
            background: #0ea5e9;
            color: white !important;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none !important;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 2147483647;
            /* Ensure it stays above the SPA layer */
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: block !important;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        /* Privacy Settings moved to top line */
        #privacy-settings-custom {
            position: fixed;
            top: 22px;
            right: 170px;
            z-index: 2147483647;
            color: #475569;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        #privacy-settings-custom:hover {
            color: #0ea5e9;
        }

        #portal-tab-custom:hover {
            background: #0284c7;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
        }

        @media (max-width: 768px) {
            #portal-tab-custom {
                right: 15px;
                top: 80px;
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }

            #privacy-settings-custom {
                top: 85px;
                right: 150px;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- Top line utility navigation -->
    <a href="#" id="privacy-settings-custom">Privacy Settings</a>
    <!-- Team Portal points to the CRM (ccrm.html) -->
    <a href="ccrm.html" id="portal-tab-custom">Team Portal</a>

    <script>
        window.__SITE_ID__ = '69923537a592372b8bebdfe6';

        const applyFixes = () => {
            // Force restore scrolling
            document.documentElement.style.setProperty('overflow', 'auto', 'important');
            document.body.style.setProperty('overflow', 'auto', 'important');
            document.documentElement.style.setProperty('height', 'auto', 'important');
            document.body.style.setProperty('height', 'auto', 'important');

            // Find and hide specific elements from the SPA
            document.querySelectorAll('button, a, span, div, p').forEach(el => {
                const text = el.textContent.trim();
                const iconCheck = el.querySelector('svg, i') || el;

                // Hide Explore App
                if (text.toLowerCase() === 'explore app') {
                    const target = el.closest('button') || el.closest('a') || el;
                    target.classList.add('hide-element');
                }
                // Hide Admin button
                if (text === 'Admin') {
                    const target = el.closest('button') || el.closest('a') || el;
                    target.classList.add('hide-element');
                }
                // Hide existing 'Privacy Settings' (as we moved it to top Custom nav)
                if (text === 'Privacy Settings' && el.id !== 'privacy-settings-custom') {
                    const target = el.closest('button') || el.closest('a') || el;
                    target.classList.add('hide-element');
                }
                // Intercept the San Francisco address and change to Mumbai
                if (text.includes('San Francisco, CA')) {
                    el.textContent = 'Mumbai, Maharashtra 400051';
                }
            });

            // Hide Gear Icon specifically (usually SVG)
            document.querySelectorAll('svg').forEach(svg => {
                // Heuristic: if inside a button with no text (or only a tiny parent) it's likely the gear icon bottom right
                const parentBtn = svg.closest('button');
                if (parentBtn && parentBtn.textContent.trim() === '' && !parentBtn.closest('nav')) {
                    parentBtn.classList.add('hide-element');
                }
            });
        };

        // Run immediately and then frequently to combat SPA state changes
        applyFixes();
        window.addEventListener('load', applyFixes);
        setInterval(applyFixes, 800);
    </script>
    <script src="https://static.famous.ai/events.js"></script>
</body>

</html>
